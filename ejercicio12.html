<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 12</title>
</head>
<body>
    <script>
        const numeroPar = () => {
            let numero = Number(prompt(`Ingrese un número entero:`));
            let resto = numero % 2

            if (resto == 0){
                alert(`El número ${numero} es par`);
            } else {
                alert(`El número ${numero} es impar`)
            }
        };
        numeroPar();
    </script>
</body>
</html>
