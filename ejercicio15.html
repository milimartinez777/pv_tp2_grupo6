<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 15</title>
</head>

<body>

<script>

    const retornarMes = (numero) => {

        if (numero == 1) {
            return "Enero";

        } else if (numero == 2) {
            return "Febrero";

        } else if (numero == 3) {
            return "Marzo";

        } else if (numero == 4) {
            return "Abril";

        } else if (numero == 5) {
            return "Mayo";

        } else if (numero == 6) {
            return "Junio";

        } else if (numero == 7) {
            return "Julio";

        } else if (numero == 8) {
            return "Agosto";

        } else if (numero == 9) {
            return "Septiembre";

        } else if (numero == 10) {
            return "Octubre";

        } else if (numero == 11) {
            return "Noviembre";

        } else if (numero == 12) {
            return "Diciembre";

        } else {
            return "No es un mes";
        }

    };

    let numero = parseInt(prompt("Ingrese un número"));

    let resultado = retornarMes(numero);

    document.write(`
        <h2>${resultado}</h2>
    `);

</script>
</body>
</html>
