<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 18</title>
</head>
<body>

    <script>
        const calcularMayor = (numero1, numero2) => {
            
            if (numero1 > numero2) {
                document.write(`El primer número (${numero1}) es mayor que el segundo (${numero2}).`);
            } 
            else if (numero2 > numero1) {
                document.write(`El segundo número (${numero2}) es mayor que el primero (${numero1}).`);
            } 
            else {
                document.write(`Ambos números son iguales: ${numero1} = ${numero2}.`);
            }
        };

      
        let numero1 = Number(prompt("Ingrese el primer número:"));
        let numero2 = Number(prompt("Ingrese el segundo número:"));

        if (!isNaN(numero1) && !isNaN(numero2)) {
            calcularMayor(numero1, numero2);
        } else {
            document.write("Ingrese solo valores numéricos");
        }
    </script>
</body>
</html>
