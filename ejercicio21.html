<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 21 - Paises y capitales</title>
    <link rel="stylesheet" href="css/ejercicio21.css"></link>
</head>
<body>
    <div class="contenedor">
        <h1>Países de América</h1>
        <p>Seleccione un país</p>
        <label for="pais">País</label>
        <select id="pais">
            <option value="Buenos Aires">Argentina</option>
            <option value="Brasilia">Brasil</option>
            <option value="Santiago de Chile">Chile</option>
            <option value="Lima">Perú</option>
            <option value="Montevideo">Uruguay</option>
            <option value="Bogotá">Colombia</option>
        </select>
        <label for="capital">Capital</label>
        <select id="capital">
            <option value="Buenos Aires">Buenos Aires</option>
            <option value="Brasilia">Brasilia</option>
            <option value="Santiago de Chile">Santiago de Chile</option>
            <option value="Lima">Lima</option>
            <option value="Montevideo">Montevideo</option>
            <option value="Bogotá">Bogotá</option>
        </select>

    </div>
    <script type="module" src="js/ejercicio21.js"></script>
</body>
</html>
