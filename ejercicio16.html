<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 16</title>
</head>

<body>

<script>

    const sumarRango = (inicio, fin) => {

        let suma = 0;

        if (inicio <= fin) {

            let i = inicio;

            while (i <= fin) {

                suma = suma + i;

                i++;

            }

            return suma;

        } else {

            return "El inicio no puede ser mayor al final";
        }

    };

    let numeroInicial = parseInt(prompt("Ingrese el número inicial"));

    let numeroFinal = parseInt(prompt("Ingrese el número final"));

    let sumaTotal = sumarRango(numeroInicial, numeroFinal);

    document.write(`
        <h2>El resultado de toda la suma</h2>
        <p>Nº Inicio: ${numeroInicial}</p>
        <p>Nº Final: ${numeroFinal}</p>
        <p>Suma: ${sumaTotal}</p>
    `);

</script>
</body>
</html>
